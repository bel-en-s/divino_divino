<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIVINO DIVINO — Draw</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:serif;
}

.hero{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

.hero-video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

.center-text{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:72px;
letter-spacing:.15em;
color:black;
z-index:2;
pointer-events:none;
}

/* UI */

.ui{
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
z-index:5;
display:flex;
flex-direction:column;
gap:10px;
}

.ui button{
background:white;
border:none;
padding:8px 12px;
font-size:14px;
cursor:pointer;
}

.ui button.active{
background:black;
color:white;
}

@media (max-width:700px){

.ui{
right:10px;
top:auto;
bottom:20px;
flex-direction:row;
transform:none;
}

.center-text{
font-size:40px;
}

}

</style>
</head>

<body>

<section class="hero">

<video class="hero-video" autoplay muted loop playsinline>
<source src="/hero/hero.mp4" type="video/mp4">
</video>

<div class="center-text">
DIVINO DIVINO
</div>

<div class="ui">
<button data-brush="transparent" class="active">Transparent</button>
<button data-brush="red">Red</button>
<button data-brush="black">Black</button>
<button id="clear">Clear</button>
</div>

</section>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

class PixelDraw{

constructor(){

this.hero=document.querySelector(".hero");
this.video=document.querySelector(".hero-video");

this.grid=140;
this.brushSize=1;
this.brush="transparent";

this.isTouch=window.matchMedia("(pointer: coarse)").matches;

this.enabled=true;
this.drawing=false;

this.init();

}

createVideoTexture(){

const tex=new THREE.VideoTexture(this.video);
tex.minFilter=THREE.NearestFilter;
tex.magFilter=THREE.NearestFilter;

return tex;

}

createDataTexture(){

const size=this.grid;

this.data=new Float32Array(size*size*4);

this.clear();

this.dataTexture=new THREE.DataTexture(
this.data,
size,
size,
THREE.RGBAFormat,
THREE.FloatType
);

this.dataTexture.magFilter=THREE.NearestFilter;
this.dataTexture.minFilter=THREE.NearestFilter;

}

clear(){

for(let i=0;i<this.data.length;i+=4){

this.data[i]=0;
this.data[i+1]=0;
this.data[i+2]=0;
this.data[i+3]=0;

}

if(this.dataTexture) this.dataTexture.needsUpdate=true;

}

paint(x,y){

const size=this.grid;

const px=Math.floor(x*size);
const py=Math.floor((1-y)*size);

for(let dx=-this.brushSize;dx<=this.brushSize;dx++){
for(let dy=-this.brushSize;dy<=this.brushSize;dy++){

const x2=px+dx;
const y2=py+dy;

if(x2<0||y2<0||x2>=size||y2>=size)continue;

const index=4*(x2+y2*size);

if(this.brush==="transparent"){

this.data[index]=0.07;
this.data[index+1]=0.07;
this.data[index+2]=0;

}

if(this.brush==="red"){

this.data[index]=1;
this.data[index+1]=0;
this.data[index+2]=0;

}

if(this.brush==="black"){

this.data[index]=0;
this.data[index+1]=0;
this.data[index+2]=1;

}

this.data[index+3]=1;

}
}

this.dataTexture.needsUpdate=true;

}

initScene(texture){

const w=this.hero.offsetWidth;
const h=this.hero.offsetHeight;

this.scene=new THREE.Scene();

this.camera=new THREE.OrthographicCamera(-1,1,1,-1,0.1,10);
this.camera.position.z=1;

const geometry=new THREE.PlaneGeometry(2,2);

const material=new THREE.ShaderMaterial({

uniforms:{
uTexture:{value:texture},
uDataTexture:{value:this.dataTexture},
uGrid:{value:this.grid}
},

vertexShader:`

varying vec2 vUv;

void main(){
vUv=uv;
gl_Position=vec4(position,1.);
}

`,

fragmentShader:`

uniform sampler2D uTexture;
uniform sampler2D uDataTexture;
uniform float uGrid;

varying vec2 vUv;

void main(){

vec2 pixelUv=floor(vUv*uGrid)/uGrid;

vec4 data=texture2D(uDataTexture,pixelUv);

if(data.a>0.){

if(data.b==1.){
gl_FragColor=vec4(0.,0.,0.,1.);
return;
}

if(data.r==1.){
gl_FragColor=vec4(1.,0.,0.,1.);
return;
}

vec2 uv=pixelUv-data.rg;
gl_FragColor=texture2D(uTexture,uv);

}else{

gl_FragColor=texture2D(uTexture,pixelUv);

}

}

`

});

this.mesh=new THREE.Mesh(geometry,material);
this.scene.add(this.mesh);

this.renderer=new THREE.WebGLRenderer({antialias:false});
this.renderer.setSize(w,h);

this.hero.appendChild(this.renderer.domElement);

this.video.style.opacity=0;

}

setupEvents(){

const getCoords=(e)=>{

const rect=this.hero.getBoundingClientRect();

return{
x:(e.clientX-rect.left)/rect.width,
y:(e.clientY-rect.top)/rect.height
};

};

if(!this.isTouch){

this.hero.addEventListener("pointermove",e=>{

if(!this.enabled)return;

const p=getCoords(e);
this.paint(p.x,p.y);

});

this.hero.addEventListener("click",()=>{

this.enabled=!this.enabled;

});

}

else{

this.hero.addEventListener("pointerdown",e=>{

this.drawing=true;

const p=getCoords(e);
this.paint(p.x,p.y);

});

this.hero.addEventListener("pointermove",e=>{

if(!this.drawing)return;

const p=getCoords(e);
this.paint(p.x,p.y);

});

window.addEventListener("pointerup",()=>{

this.drawing=false;

});

}

}

setupUI(){

document.querySelectorAll("[data-brush]").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll("[data-brush]").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

this.brush=btn.dataset.brush;

};

});

document.getElementById("clear").onclick=()=>this.clear();

}

render(){

this.renderer.render(this.scene,this.camera);

requestAnimationFrame(()=>this.render());

}

async init(){

await new Promise(r=>{

if(this.video.readyState>=2)r();
else this.video.addEventListener("loadeddata",r,{once:true});

});

this.video.play();

const tex=this.createVideoTexture();

this.createDataTexture();

this.initScene(tex);

this.setupEvents();

this.setupUI();

this.render();

}

}

new PixelDraw();

</script>

</body>
</html>
