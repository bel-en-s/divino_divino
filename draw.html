<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIVINO DIVINO — Draw</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
font-family: serif;
background:black;
}

.hero{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

.hero-video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

.center-text{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:72px;
letter-spacing:0.15em;
z-index:2;
pointer-events:none;
color:black;
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
pointer-events:none;
}

</style>
</head>

<body>

<section class="hero">

<video class="hero-video" autoplay muted loop playsinline>
<source src="/hero/hero.mp4" type="video/mp4">
</video>

<div class="center-text">
DIVINO DIVINO
</div>

</section>


<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

class PixelDraw {

constructor(){

this.hero=document.querySelector(".hero");
this.video=document.querySelector(".hero-video");

this.grid=120;

this.init();

}

createVideoTexture(){

const tex=new THREE.VideoTexture(this.video);
tex.minFilter=THREE.NearestFilter;
tex.magFilter=THREE.NearestFilter;

return tex;

}

createDataTexture(){

const size=this.grid;
const data=new Float32Array(size*size*4);

for(let i=0;i<data.length;i+=4){

data[i]=0;
data[i+1]=0;
data[i+2]=0;
data[i+3]=1;

}

this.dataTexture=new THREE.DataTexture(
data,
size,
size,
THREE.RGBAFormat,
THREE.FloatType
);

this.dataTexture.needsUpdate=true;
this.dataTexture.magFilter=THREE.NearestFilter;
this.dataTexture.minFilter=THREE.NearestFilter;

}

draw(x,y){

const size=this.grid;

const px=Math.floor(x*size);
const py=Math.floor((1-y)*size);

const data=this.dataTexture.image.data;
const index=4*(px+py*size);

data[index]=0.08;
data[index+1]=0.08;

this.dataTexture.needsUpdate=true;

}

initScene(texture){

const width=this.hero.offsetWidth;
const height=this.hero.offsetHeight;

this.scene=new THREE.Scene();

this.camera=new THREE.OrthographicCamera(-1,1,1,-1,0.1,10);
this.camera.position.z=1;

const geometry=new THREE.PlaneGeometry(2,2);

const material=new THREE.ShaderMaterial({

uniforms:{
uTexture:{value:texture},
uDataTexture:{value:this.dataTexture},
uGrid:{value:this.grid}
},

vertexShader:`

varying vec2 vUv;

void main(){

vUv=uv;
gl_Position=vec4(position,1.);

}

`,

fragmentShader:`

uniform sampler2D uTexture;
uniform sampler2D uDataTexture;
uniform float uGrid;

varying vec2 vUv;

void main(){

vec2 pixelUv=floor(vUv*uGrid)/uGrid;

vec2 offset=texture2D(uDataTexture,pixelUv).rg;

vec2 uv=pixelUv-offset;

gl_FragColor=texture2D(uTexture,uv);

}

`

});

this.mesh=new THREE.Mesh(geometry,material);
this.scene.add(this.mesh);

this.renderer=new THREE.WebGLRenderer({antialias:false});
this.renderer.setSize(width,height);

this.hero.appendChild(this.renderer.domElement);

this.video.style.opacity=0;

}

setupEvents(){

this.hero.addEventListener("pointermove",e=>{

const rect=this.hero.getBoundingClientRect();

const x=(e.clientX-rect.left)/rect.width;
const y=(e.clientY-rect.top)/rect.height;

this.draw(x,y);

});

}

render(){

this.renderer.render(this.scene,this.camera);

requestAnimationFrame(()=>this.render());

}

async init(){

await new Promise(resolve=>{

if(this.video.readyState>=2)resolve();
else this.video.addEventListener("loadeddata",resolve,{once:true});

});

this.video.play();

const texture=this.createVideoTexture();

this.createDataTexture();

this.initScene(texture);

this.setupEvents();

this.render();

}

}

new PixelDraw();

</script>

</body>
</html>
